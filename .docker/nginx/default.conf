server {
    listen 80 default_server;
    server_name _;
    root /var/www/html/webroot;
    index index.php;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        # Streaming PHP responses (RadioID lookup-cache sync at
        # /admin/callsign-lookups/provider/radioid_database_dump/refresh)
        # can run for tens of seconds while emitting per-chunk progress.
        # Disable response buffering and bump the read timeout so nginx
        # forwards each chunk immediately and waits long enough for the
        # slowest realistic case (network + 250k inserts ≈ 30 s; give
        # 5 min of headroom). The PHP side also sends X-Accel-Buffering:
        # no — the upstream config wins on conflict, so we set both.
        fastcgi_buffering off;
        fastcgi_read_timeout 300s;
    }

    location ~ /\.(ht|git|env) { deny all; }
}
