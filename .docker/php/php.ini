memory_limit = 256M
upload_max_filesize = 16M
post_max_size = 20M
max_execution_time = 60
date.timezone = UTC
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
opcache.enable_cli = 1

; Xdebug: idle by default so it doesn't slow normal requests. The PHPUnit
; runner sets XDEBUG_MODE=coverage per-invocation (see container exec call)
; to switch the driver on just for the coverage pass.
xdebug.mode = off
